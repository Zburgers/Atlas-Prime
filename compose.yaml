name: atlas-prime

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atlas_prime}
      POSTGRES_USER: ${POSTGRES_USER:-atlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atlas}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-16379}:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-atlasminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-atlasminiopassword}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-bootstrap:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-atlasminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-atlasminiopassword}
      MINIO_BUCKET_ORIGINALS: ${MINIO_BUCKET_ORIGINALS:-atlas-originals}
      MINIO_BUCKET_PROCESSED: ${MINIO_BUCKET_PROCESSED:-atlas-processed}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$MINIO_BUCKET_ORIGINALS"
        mc mb --ignore-existing "local/$$MINIO_BUCKET_PROCESSED"
        mc anonymous set none "local/$$MINIO_BUCKET_ORIGINALS"
        mc anonymous set none "local/$$MINIO_BUCKET_PROCESSED"

  api:
    build:
      context: ./apps/api
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://atlas:atlas@postgres:5432/atlas_prime}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-atlasminio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-atlasminiopassword}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-}
      CLERK_ISSUER: ${CLERK_ISSUER:-}
      CLERK_AUTHORIZED_PARTIES: ${CLERK_AUTHORIZED_PARTIES:-http://localhost:3001}
      ATLAS_ALLOW_DEV_AUTH_HEADERS: ${ATLAS_ALLOW_DEV_AUTH_HEADERS:-false}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/live', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 12

  worker:
    build:
      context: ./workers/media
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-atlasminio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-atlasminiopassword}
    depends_on:
      redis:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "celery -A media_worker.celery_app inspect ping --timeout=5 | grep -q pong"]
      interval: 15s
      timeout: 8s
      retries: 8

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-${CLERK_PUBLISHABLE_KEY:-}}
        CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-${CLERK_PUBLISHABLE_KEY:-}}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
    ports:
      - "${WEB_PORT:-3001}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 12

  web-test:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: builder
    profiles:
      - test
    command: ["npm", "--workspace", "apps/web", "test"]

volumes:
  postgres-data:
  minio-data:
