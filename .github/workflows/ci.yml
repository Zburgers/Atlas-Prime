name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  devex:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create env file
        run: cp .env.example .env

      - name: Validate Compose config
        run: docker compose config -q

      - name: Build stack
        run: docker compose build

      - name: Run API tests
        run: docker compose run --rm api pytest

      - name: Run web tests
        run: docker compose run --rm --build web-test npm --workspace apps/web test

      - name: Run Sector H smoke
        run: ./scripts/smoke-devex.sh

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop stack
        if: always()
        run: docker compose down -v
